[settings]
experimental = true

[tools]
go = "1.26"
goreleaser = "latest"
gotestsum = "latest"
golangci-lint = "latest"
node = "lts"
pkl = "latest"
hk = "latest"
"npm:@fission-ai/openspec" = "latest"

[env]
HK_MISE = "1"

[hooks]
postinstall = """
  # Install git hooks (pre-commit, pre-push, check) defined in hk.pkl.
  hk install --mise || true

  # Initialize or update the OpenSpec scaffold.
  if [ ! -d openspec ]; then
    openspec init --tools claude
  else
    openspec update
  fi

  # Pre-stage project setup so `mise install` gives a build-ready tree.
  go mod download || true
  command -v govulncheck >/dev/null 2>&1 || go install golang.org/x/vuln/cmd/govulncheck@latest || true
"""

[tasks]
# Local development commands (no Dagger)
build = "go build ."  # Simple local build
test = "gotestsum --format pkgname --jsonfile /tmp/gotest.json -- ./..."  # Formatted tests with gotestsum
"test:raw" = "go test -v ./..."  # Raw test output without formatting

# Unit test commands (formatted with gotestsum)
"test:unit" = "gotestsum --format pkgname --jsonfile /tmp/gotest.json -- ./internal/..."  # All internal package tests
"test:helpers" = "gotestsum --format testname -- ./internal/helpers"  # Helpers package tests
"test:processors" = "gotestsum --format testname -- ./internal/processors"  # Processors package tests
"test:system" = "gotestsum --format testname -- ./internal/system"  # System package tests
"test:coverage" = "gotestsum --format pkgname -- -cover ./internal/..."  # Test with coverage report

# Watch mode for development
"test:watch" = "gotestsum --watch --format testname"  # Watch for file changes and run tests
lint = "golangci-lint run"  # Run golangci-lint

# Raw test commands (without formatting)
"test:unit:raw" = "go test ./internal/... -v"  # Raw internal package tests
"test:helpers:raw" = "go test ./internal/helpers -v"  # Raw helpers tests
"test:processors:raw" = "go test ./internal/processors -v"  # Raw processors tests
"test:system:raw" = "go test ./internal/system -v"  # Raw system tests

format = "go fmt ./..."  # Format Go source with gofmt
fmt = { depends = ["format"] }  # Alias for `format`

[tasks.update]
description = "Update Go module dependencies to latest minor/patch versions"
run = """
go get -u ./...
go mod tidy
"""

[tasks.start]
description = "Run rwr locally (pass args after --)"
run = "go run . $@"

[tasks.security]
description = "Scan for known vulnerabilities (govulncheck — staged by postinstall)"
run = "govulncheck ./..."

[tasks.install]
description = "Install rwr to ~/.local/bin (linux/macos); errors on windows"
run = """
case "$(uname -s)" in
  Linux|Darwin)
    mkdir -p "$HOME/.local/bin"
    go build -o "$HOME/.local/bin/rwr" .
    echo "installed: $HOME/.local/bin/rwr"
    ;;
  *)
    echo "install: not implemented for $(uname -s)" >&2
    exit 1
    ;;
esac
"""

[tasks.ci]
description = "Run the full CI check locally (test + lint + security)"
depends = ["test", "lint", "security"]
